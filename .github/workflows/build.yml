name: Build and publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CSC_IDENTITY_AUTO_DISCOVERY: false

jobs:
  tests:
    uses: ./.github/workflows/tests.yml

  build-windows:
    needs: [tests]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Caprine
        run: npm run build

      - name: Package Windows installer
        run: npm run dist:win -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure GitHub Release exists
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes --repo "${{ github.repository }}" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows release artifacts
        run: gh release upload "${{ github.ref_name }}" dist/Caprine-*-x64.exe dist/Caprine-*-x64.exe.blockmap dist/latest.yml --clobber --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
